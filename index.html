<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Feliz Dia dos Namorados ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* FUNDO COM FOTOS */
.slideshow {
  position: fixed;
  width: 100%;
  height: 100%;
}

.slideshow img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: fade 18s infinite;
}

.slideshow img:nth-child(1) { animation-delay: 0s; }
.slideshow img:nth-child(2) { animation-delay: 6s; }
.slideshow img:nth-child(3) { animation-delay: 12s; }

@keyframes fade {
  0% { opacity: 0; }
  10% { opacity: 1; }
  30% { opacity: 1; }
  40% { opacity: 0; }
  100% { opacity: 0; }
}

/* TEXTO INICIAL */
.inicio {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
  font-size: 50px;
  color: white;
  text-shadow: 2px 2px 10px #ff4d6d;

  animation: aparecerSumir 6s forwards;
}

@keyframes aparecerSumir {
  0% { opacity: 0; transform: scale(0.8); }
  20% { opacity: 1; transform: scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; }
}

/* TEXTO SUBINDO */
.texto {
  position: absolute;
  width: 100%;
  bottom: -100%;
  text-align: center;
  font-size: 28px;
  color: white;
  padding: 20px;
  text-shadow: 2px 2px 8px #ff4d6d;

  animation: subir 25s linear infinite;
  animation-delay: 6s; /* começa depois do primeiro sumir */
}

@keyframes subir {
  0% { bottom: -100%; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { bottom: 120%; opacity: 0; }
}
</style>

</head>

<body>

<!-- SLIDES -->
<div class="slideshow">
  <img src="foto1.jpeg">
  <img src="foto2.jpeg">
  <img src="foto3.jpeg">
  <img src="foto4.jpeg">
  <img src="foto5.jpeg">
</div>

<!-- TEXTO INICIAL -->
<div class="inicio">
  ❤️ Feliz Dia dos Namorados ❤️
</div>

<!-- SEU TEXTO -->
<div class="texto">
  Meu amor ❤️<br><br>

  Desde o dia que você entrou na minha vida,<br>
  tudo ficou mais bonito... 💕<br><br>

  Cada momento ao seu lado é único,<br>
  e eu guardo todos eles no coração 💖<br><br>

  Você é meu presente favorito,<br>
  hoje e sempre ❤️<br><br>

  Eu te amo infinitamente ❤️
</div>

<!-- MÚSICA -->
<audio controls autoplay loop>
  <source src="musica.mpeg" type="audio/mpeg">
</audio>

</body>
</html>
